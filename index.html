<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#040507"/>
  <title>Banší</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#010610;min-height:100vh;display:flex;flex-direction:column;align-items:center;
         justify-content:center;font-family:Georgia,serif;overflow-x:hidden;padding:20px 0 40px}
    .glyph{position:absolute;pointer-events:none;user-select:none;transition:color 1.2s;
            animation:drift var(--dur) var(--delay) ease-in-out infinite alternate}
    @keyframes drift{from{transform:translateY(0) rotate(-4deg);opacity:0.25}to{transform:translateY(-18px) rotate(5deg);opacity:0.8}}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:0.08}50%{transform:scale(1.18);opacity:0.22}}
    @keyframes wailTitle{0%,100%{letter-spacing:0.28em;text-shadow:0 0 20px rgba(10,90,255,0.45)}50%{letter-spacing:0.45em;text-shadow:0 0 60px rgba(10,110,255,1.0)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;cursor:pointer}
    #title-word{font-size:3.8rem;font-weight:400;letter-spacing:0.3em;color:rgba(140,195,255,0.95);transition:text-shadow 1s}
    #fog{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 65% 45% at 50% 55%,rgba(0,8,35,0.8) 0%,transparent 70%)}
    #mixer label{width:68px;font-size:0.9rem;letter-spacing:0.08em;text-transform:uppercase;
                  color:rgba(60,150,250,0.85);text-align:left;flex-shrink:0}
    #mixer .val{width:36px;font-size:0.85rem;color:rgba(50,140,250,0.8);text-align:left}
    #mixer .row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    #status{margin:22px 0 32px;font-size:1rem;letter-spacing:0.3em;text-transform:uppercase;
             min-height:1.4em;color:rgba(30,110,220,0.6);transition:color 0.8s}
    #btn-wrap{position:relative;width:130px;height:130px;cursor:pointer;user-select:none;flex-shrink:0}
    #btn-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
                width:88px;height:88px;border-radius:50%;display:flex;align-items:center;
                justify-content:center;border:1px solid rgba(10,80,240,0.35);transition:background 0.6s,box-shadow 0.6s}
    .ring{position:absolute;border-radius:50%;border:1px solid rgba(10,80,240,0.14);pointer-events:none;display:none}
  </style>
</head>
<body>
<div id="fog"></div>
<div id="glyphs"></div>

<div id="title" style="margin-bottom:44px;text-align:center">
  <div style="font-size:1rem;letter-spacing:0.55em;text-transform:uppercase;color:rgba(60,140,255,0.8);margin-bottom:12px">Hlas</div>
  <div id="title-word">Banší</div>
  <div style="font-size:1.1rem;letter-spacing:0.45em;text-transform:uppercase;color:rgba(40,130,255,0.6);margin-top:8px">Náchod</div>
</div>

<div id="rings">
  <div class="ring" id="r1" style="width:200px;height:200px"></div>
  <div class="ring" id="r2" style="width:280px;height:280px"></div>
  <div class="ring" id="r3" style="width:420px;height:420px"></div>
</div>

<div id="btn-wrap" onclick="toggle()">
  <svg id="progress-svg" width="130" height="130" style="position:absolute;top:0;left:0;transform:rotate(-90deg)">
    <circle cx="65" cy="65" r="54" fill="none" stroke="rgba(5,50,200,0.25)" stroke-width="1.5"/>
    <circle id="arc" cx="65" cy="65" r="54" fill="none" stroke="rgba(20,130,255,0.9)" stroke-width="1.5"
      stroke-dasharray="339.3" stroke-dashoffset="339.3" stroke-linecap="round"
      style="transition:stroke-dashoffset 0.1s linear"/>
  </svg>
  <div id="btn-inner" style="background:radial-gradient(circle,rgba(0,15,60,0.4) 0%,rgba(0,8,35,0.95) 100%);box-shadow:0 0 12px rgba(5,30,160,0.22)">
    <svg id="icon-play" width="20" height="20" viewBox="0 0 20 20" fill="none">
      <polygon points="5,3 17,10 5,17" fill="rgba(100,185,255,1.0)"/>
    </svg>
    <svg id="icon-pause" width="20" height="20" viewBox="0 0 20 20" fill="none" style="display:none">
      <rect x="4" y="3" width="4" height="14" rx="1" fill="rgba(100,185,255,1.0)"/>
      <rect x="12" y="3" width="4" height="14" rx="1" fill="rgba(100,185,255,1.0)"/>
    </svg>
    <svg id="icon-load" width="22" height="22" viewBox="0 0 22 22" style="display:none;animation:spin 1s linear infinite">
      <circle cx="11" cy="11" r="9" fill="none" stroke="rgba(60,140,255,0.8)" stroke-width="2" stroke-dasharray="28 14"/>
    </svg>
  </div>
</div>

<div id="status"></div>

<div id="mixer" style="width:290px">
  <div class="row">
    <label>Plech</label>
    <input type="range" id="sl-cat" min="0" max="1" step="0.01" value="0.5"
      style="flex:1;accent-color:#1a7aff" oninput="onMix('cat',this.value)"/>
    <span class="val" id="v-cat">50</span>
  </div>
  <div class="row">
    <label>Sklo</label>
    <input type="range" id="sl-cow" min="0" max="1" step="0.01" value="1.0"
      style="flex:1;accent-color:#1a90ff" oninput="onMix('cow',this.value)"/>
    <span class="val" id="v-cow">100</span>
  </div>
  <div class="row">
    <label>Hlas</label>
    <input type="range" id="sl-hlas" min="0" max="1" step="0.01" value="0.7"
      style="flex:1;accent-color:#2080ff" oninput="onMix('hlas',this.value)"/>
    <span class="val" id="v-hlas">70</span>
  </div>
  <div class="row">
    <label>Vítr</label>
    <input type="range" id="sl-vtr" min="0" max="1" step="0.01" value="0.15"
      style="flex:1;accent-color:#1ab0f0" oninput="onMix('harm',this.value)"/>
    <span class="val" id="v-harm">15</span>
  </div>
</div>

<div id="err" style="margin-top:20px;font-size:0.8rem;color:rgba(255,100,100,0.8);max-width:300px;text-align:center;line-height:1.6"></div>

const GLYPHS = "ᚁᚂᚃᚄᚅᚆᚇᚈᚉᚋᚌᚍᚎᚏ".split("");
const DURATION = 11;

const mix = {cat:0.5, cow:1.0, hlas:0.7, harm:0.15};
const gainNodes = {};
let audioCtx = null, raf = null, startTime = null, playing = false;

// Glyphs
const gc = document.getElementById('glyphs');
for(let i=0;i<14;i++){
  const s = document.createElement('span');
  s.className='glyph';
  s.textContent = GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;`+
    `font-size:${0.7+Math.random()*1.1}rem;color:rgba(5,25,90,0.12);`+
    `--dur:${3+Math.random()*5}s;--delay:${Math.random()*4}s`;
  gc.appendChild(s);
}

function b64ToArrayBuffer(b64){
  const bin=atob(b64), buf=new ArrayBuffer(bin.length), v=new Uint8Array(buf);
  for(let i=0;i<bin.length;i++) v[i]=bin.charCodeAt(i);
  return buf;
}

function trimBuffer(ctx, buf, thr=0.012){
  const ch=buf.getChannelData(0); let s=0;
  for(let i=0;i<ch.length;i++){if(Math.abs(ch[i])>thr){s=i;break;}}
  const n=Math.min(ch.length-s, ctx.sampleRate*3.5);
  const out=ctx.createBuffer(buf.numberOfChannels,n,buf.sampleRate);
  for(let c=0;c<buf.numberOfChannels;c++) out.getChannelData(c).set(buf.getChannelData(c).subarray(s,s+n));
  return out;
}

async function pitchShift(buf, semitones){
  const r=Math.pow(2,semitones/12), n=Math.round(buf.length/r);
  const off=new OfflineAudioContext(buf.numberOfChannels,n,buf.sampleRate);
  const src=off.createBufferSource(); src.buffer=buf; src.playbackRate.value=r;
  src.connect(off.destination); src.start(0); return off.startRendering();
}

function makeReverb(ctx){
  const len=Math.floor(ctx.sampleRate*5.5), ir=ctx.createBuffer(2,len,ctx.sampleRate);
  for(let c=0;c<2;c++){const d=ir.getChannelData(c);for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.2);}
  const cv=ctx.createConvolver(); cv.buffer=ir; return cv;
}

// Peak gain values for each layer (used by sliders during playback)
const peakGain = {cat:0.9, cow:1.6, hlas:0.9, harm:0.18};

function onMix(key, val){
  mix[key]=parseFloat(val);
  document.getElementById('v-'+key).textContent=Math.round(mix[key]*100);
  if(playing && gainNodes[key] && audioCtx){
    // Directly set the current gain value scaled by mix
    gainNodes[key].gain.value = peakGain[key] * mix[key];
  }
}

function setStatus(s){
  const el=document.getElementById('status');
  const tw=document.getElementById('title-word');
  const bi=document.getElementById('btn-inner');
  const glyphs=document.querySelectorAll('.glyph');
  const rings=[document.getElementById('r1'),document.getElementById('r2'),document.getElementById('r3')];
  if(s==='playing'){
    el.textContent=''; el.style.color='rgba(40,150,255,0.9)';
    tw.style.animation='wailTitle 2.8s ease-in-out infinite';
    tw.style.textShadow='0 0 50px rgba(10,110,255,0.95)';
    bi.style.background='radial-gradient(circle,rgba(0,50,210,0.55) 0%,rgba(0,8,35,0.95) 100%)';
    bi.style.boxShadow='0 0 40px rgba(10,90,255,0.45)';
    document.getElementById('icon-play').style.display='none';
    document.getElementById('icon-pause').style.display='block';
    document.getElementById('icon-load').style.display='none';
    glyphs.forEach(g=>g.style.color='rgba(10,90,240,0.22)');
    rings.forEach((r,i)=>{r.style.display='block';r.style.animation=`pulse ${2+i*0.7}s ${i*0.5}s ease-in-out infinite`;});
  } else if(s==='loading'){
    el.textContent='Načítám…'; el.style.color='rgba(30,110,220,0.6)';
    document.getElementById('icon-play').style.display='none';
    document.getElementById('icon-pause').style.display='none';
    document.getElementById('icon-load').style.display='block';
  } else {
    el.textContent = s==='hotovo' ? 'Hotovo' : '';
    el.style.color='rgba(30,110,220,0.6)';
    tw.style.animation='none';
    tw.style.textShadow='0 0 20px rgba(120,70,170,0.3)';
    bi.style.background='radial-gradient(circle,rgba(0,15,60,0.4) 0%,rgba(0,8,35,0.95) 100%)';
    bi.style.boxShadow='0 0 12px rgba(5,30,160,0.22)';
    document.getElementById('icon-play').style.display='block';
    document.getElementById('icon-pause').style.display='none';
    document.getElementById('icon-load').style.display='none';
    glyphs.forEach(g=>g.style.color='rgba(5,25,90,0.12)');
    rings.forEach(r=>r.style.display='none');
    document.getElementById('arc').style.strokeDashoffset='339.3';
  }
}

async function startPlay(){
  setStatus('loading');
  document.getElementById('err').textContent='';
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    audioCtx=ctx;
    const [strechaRaw,skloRaw,hlasRaw]=await Promise.all([
      ctx.decodeAudioData(b64ToArrayBuffer(STRECHA_B64)),
      ctx.decodeAudioData(b64ToArrayBuffer(SKLO_B64)),
      ctx.decodeAudioData(b64ToArrayBuffer(HLAS_B64)),
    ]);
    const strechaBuf=trimBuffer(ctx,strechaRaw,0.01);
    const skloBuf=trimBuffer(ctx,skloRaw,0.01);
    const hlasBuf=trimBuffer(ctx,hlasRaw,0.01);
    const [strechaS,skloS]=await Promise.all([pitchShift(strechaBuf,2),pitchShift(skloBuf,0)]);

    const now=ctx.currentTime; startTime=now;

    const master=ctx.createGain(); master.connect(ctx.destination);
    master.gain.setValueAtTime(0,now);
    master.gain.linearRampToValueAtTime(0.05,now+0.8);
    master.gain.linearRampToValueAtTime(1.0,now+2.5);
    master.gain.linearRampToValueAtTime(1.0,now+5);
    master.gain.linearRampToValueAtTime(0.0,now+7);

    const reverb=makeReverb(ctx);
    const rvGain=ctx.createGain();
    rvGain.gain.setValueAtTime(0.1,now);
    rvGain.gain.linearRampToValueAtTime(0.4,now+3);
    rvGain.gain.linearRampToValueAtTime(1.2,now+6);
    rvGain.gain.linearRampToValueAtTime(0,now+DURATION);
    master.connect(rvGain); rvGain.connect(reverb); reverb.connect(ctx.destination);

    // STŘECHA — looping rattle builds to crash at 5s, then sklo hits
    const impactTime = 5.0;
    const skloDelay = impactTime;
    const strechaStartCrash = impactTime - 1.27; // start final play so peak lands at 5s

    // Rattle: loops pre-peak portion for long buildup
    const strechaRattle = ctx.createBufferSource();
    strechaRattle.buffer = strechaS;
    strechaRattle.loop = true;
    strechaRattle.loopEnd = Math.min(1.0, strechaS.duration);

    // Impact: single non-looping play, peak lands at 5s
    const strechaImpact = ctx.createBufferSource();
    strechaImpact.buffer = strechaS;
    strechaImpact.loop = false;

    const strechaF = ctx.createBiquadFilter();
    strechaF.type = 'highpass'; strechaF.frequency.value = 200; strechaF.Q.value = 0.7;
    const strechaG = ctx.createGain(); gainNodes.cat = strechaG;

    // Gain: quiet start → loud rattle → peak at impact → decay
    strechaG.gain.setValueAtTime(0, now);
    strechaG.gain.linearRampToValueAtTime(0.3*mix.cat, now+0.5);
    strechaG.gain.linearRampToValueAtTime(0.7*mix.cat, now+2.5);
    strechaG.gain.linearRampToValueAtTime(1.0*mix.cat, now+impactTime);
    strechaG.gain.linearRampToValueAtTime(0.2*mix.cat, now+impactTime+0.4);
    strechaG.gain.linearRampToValueAtTime(0, now+impactTime+strechaS.duration-1.27+0.5);

    strechaRattle.connect(strechaF);
    strechaImpact.connect(strechaF);
    strechaF.connect(strechaG); strechaG.connect(master);

    // SKLO — triggered at střecha's peak, plays once (no loop)
    const skloSrc=ctx.createBufferSource(); skloSrc.buffer=skloS; skloSrc.loop=false;
    const skloF=ctx.createBiquadFilter(); skloF.type='bandpass'; skloF.frequency.value=4000; skloF.Q.value=1.2;
    const skloG=ctx.createGain(); gainNodes.cow=skloG;
    skloG.gain.setValueAtTime(0, now);
    skloG.gain.setValueAtTime(0, now+skloDelay-0.01);
    skloG.gain.linearRampToValueAtTime(1.6*mix.cow, now+skloDelay+0.05);
    skloG.gain.linearRampToValueAtTime(0.8*mix.cow, now+skloDelay+0.4);
    skloG.gain.linearRampToValueAtTime(0, now+skloDelay+skloS.duration+0.3);
    skloSrc.connect(skloF); skloF.connect(skloG); skloG.connect(master);

    // HLAS — real sample
    const hlasSrc=ctx.createBufferSource(); hlasSrc.buffer=hlasBuf;
    hlasSrc.loop=true; hlasSrc.loopEnd=Math.min(hlasBuf.duration,6);
    const hlasFilter=ctx.createBiquadFilter(); hlasFilter.type='bandpass'; hlasFilter.frequency.value=1800; hlasFilter.Q.value=1.5;
    const wG=ctx.createGain(); gainNodes.hlas=wG;
    wG.gain.setValueAtTime(0,now);
    wG.gain.linearRampToValueAtTime(0.02*mix.hlas,now+0.8);
    wG.gain.linearRampToValueAtTime(0.9*mix.hlas,now+2.5);
    wG.gain.setValueAtTime(0.9*mix.hlas,now+7);
    hlasSrc.connect(hlasFilter); hlasFilter.connect(wG); wG.connect(master);

    // HARMONY — E minor
    const hO=ctx.createOscillator(); hO.type='sine';
    hO.frequency.setValueAtTime(165,now);
    hO.frequency.linearRampToValueAtTime(196,now+1.5);
    hO.frequency.linearRampToValueAtTime(247,now+3);
    hO.frequency.linearRampToValueAtTime(330,now+4.5);
    hO.frequency.linearRampToValueAtTime(247,now+5.5);
    hO.frequency.linearRampToValueAtTime(165,now+7);
    const hG=ctx.createGain(); gainNodes.harm=hG;
    hG.gain.setValueAtTime(0,now);
    hG.gain.linearRampToValueAtTime(0.18*mix.harm,now+2.5);
    hG.gain.setValueAtTime(0.18*mix.harm,now+7);
    hO.connect(hG); hG.connect(master);

    strechaRattle.start(now); strechaRattle.stop(now+strechaStartCrash);
    strechaImpact.start(now+strechaStartCrash); strechaImpact.stop(now+DURATION);
    skloSrc.start(now+skloDelay); skloSrc.stop(now+DURATION);
    hlasSrc.start(now+0.8); hlasSrc.stop(now+DURATION);
    [hO].forEach(o=>{o.start(now);o.stop(now+DURATION);});

    playing=true; setStatus('playing');

    const arc=document.getElementById('arc');
    const tick=()=>{
      const p=Math.min((ctx.currentTime-startTime)/DURATION,1);
      arc.style.strokeDashoffset=339.3*(1-p);
      document.getElementById('status').textContent=p>0?`${Math.round(p*DURATION)} / ${DURATION} s`:'';
      if(p<1){raf=requestAnimationFrame(tick);}
      else{playing=false;setStatus('hotovo');setTimeout(()=>setStatus('idle'),2000);ctx.close();}
    };
    raf=requestAnimationFrame(tick);

  }catch(e){
    console.error(e);
    document.getElementById('err').textContent='Chyba: '+e.message;
    setStatus('idle');
  }
}

function stopPlay(){
  if(raf) cancelAnimationFrame(raf);
  if(audioCtx) audioCtx.close();
  playing=false; setStatus('idle');
}

function toggle(){
  if(playing) stopPlay(); else startPlay();
}
